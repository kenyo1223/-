const OK_TIP = "✅ 这首歌从欢可以唱嗷~";
const NO_TIP = "❌ 这首歌没有收录在从欢的歌单中嗷~";

const s = document.getElementById('s');
const r = document.getElementById('r');
const songs = builtInText.split('\n').map(i=>i.trim()).filter(i=>i);

s.oninput = function(){
  const v = s.value.trim().toLowerCase();
  if(!v){ r.innerHTML = '<div class="empty-tip">请输入关键词</div>'; return; }
  const m = songs.filter(x => x.toLowerCase().includes(v));
  if(m.length===0){ r.innerHTML = `<div class="empty-tip">未找到匹配歌曲</div><div class="custom-tip">${NO_TIP}</div>`; return; }
  let h = '';
  m.forEach(t => {
    let x = t.replace(new RegExp(`(${v})`,'gi'),'<span class="highlight">$1</span>');
    x = x.replace(/(\(.*?\)|（.*?）)/g,'<span class="p">$1</span>');
    h += `<div class="result-item">🎵 ${x}</div>`;
  });
  h += `<div class="custom-tip">${OK_TIP}</div>`;
  r.innerHTML = h;
}
